# Police
font_family      MesloLGS Nerd Font
bold_font        auto
italic_font      auto
font_size        9.0

# Transparence
background_opacity 0.85

# Marges internes
window_padding_width 10

# Bordure entre les fenêtres splitées
# active_border_color   #cba6f7
# inactive_border_color #313244

# Scrollback
scrollback_lines 10000

# Thème Catppuccin Mocha
include themes/tokyo-night.conf

# Lancer fastfetch au démarrage
shell_integration enabled
startup_session ~/.config/kitty/startup.session


# BEGIN_KITTY_THEME
# ANSI 1987
include current-theme.conf
# END_KITTY_THEME
# Forme du curseur
cursor_shape           beam

# Épaisseur du beam
cursor_beam_thickness  2.0

# Couleur du curseur
cursor #cba6f7

# Clignotement
cursor_blink_interval  0.5
cursor_stop_blinking_after 0
# Dans ~/.config/kitty/kitty.conf

# Activer la traînée
cursor_trail 3

# Vitesse de disparition (début fin)
cursor_trail_decay 0.1 0.4

# Seuil de déclenchement
cursor_trail_start_threshold 2

# Forme + couleur
cursor_shape beam
cursor_beam_thickness 2.0
cursor #cba6f7


#glow
# Dans ~/.config/kitty/kitty.conf

# Curseur néon vif
cursor                    #ff00ff

# Traînée longue
cursor_trail              5
cursor_trail_decay        0.05 0.3
cursor_trail_start_threshold 1

# Beam fin pour effet laser
cursor_shape              beam
cursor_beam_thickness     1.5
